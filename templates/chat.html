{% extends "base.html" %}

{% block title %}Easel | Chat{% endblock %}

{% block content %}
<div class="page active" id="page-chat">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-heading">Conversations</span>
      <button class="btn-new">+ New</button>
    </div>
    <div class="sidebar-search">
      <input class="sidebar-search-input" type="text" placeholder="Search…" />
    </div>
    <div class="sidebar-list">
    </div>
  </aside>

  <div class="chat-main">
    <header class="chat-header">
      <div class="chat-header-info">
        <span class="chat-title" id="chat-title">New Conversation</span>
        <span class="chat-subtitle" id="chat-subtitle"></span>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn" title="Export transcript">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1.5v8M4.5 7L7 9.5 9.5 7M1.5 12.5h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="square" stroke-linejoin="miter"/>
          </svg>
        </button>
        <button class="icon-btn" title="Chat settings">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="1.25" fill="currentColor"/>
            <circle cx="2.5" cy="7" r="1.25" fill="currentColor"/>
            <circle cx="11.5" cy="7" r="1.25" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="messages-area" id="messages-area">
    </div>

    <div class="input-area">
      <div class="attachment-chips" id="attachment-chips"></div>
      <div class="input-bar">
        <input type="file" id="file-input" accept="text/*,.txt,.md,.csv,.json,.log" hidden>
        <button class="attach-btn" title="Attach file">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13.5 7.5L7 14a4 4 0 01-5.657-5.657l6.364-6.364a2.5 2.5 0 013.535 3.535L5.12 11.85a1 1 0 01-1.413-1.414L9.828 4.318" stroke="currentColor" stroke-width="1.4" stroke-linecap="square"/>
          </svg>
        </button>
        <textarea class="msg-textarea" id="msg-input" placeholder="Message Easel… (Shift+Enter for new line)" rows="1"></textarea>
        <button class="send-btn" id="send-btn" title="Send (Enter)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8h12M10 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"/>
          </svg>
        </button>
      </div>
      <div class="input-meta">
        <span>Enter to send</span>
        <span class="input-meta-sep">·</span>
        <span>Shift+Enter for new line</span>
        <span class="input-meta-sep">·</span>
        <span>@ to mention a skill</span>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script src="{{ url_for('static', path='chat.js') }}"></script>
{% endblock %}
