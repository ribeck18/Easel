<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Easel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='easel.css') }}">

  <!-- React + Babel are only needed by the Tweaks panel below, which is disabled.
       They are ~900KB of render-blocking scripts, so they stay commented out until
       the panel is re-enabled (uncomment these together with the #tweaks-root block).
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  -->
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="topnav">
    <span class="nav-brand">EASEL</span>
    <div class="nav-links">
      <a class="nav-link {% if active_page == 'chat' %}active{% endif %}" href="{{ url_for('chat_page') }}">Chat</a>
      <a class="nav-link {% if active_page == 'routines' %}active{% endif %}" href="{{ url_for('routines_page') }}">Routines</a>
      <a class="nav-link {% if active_page == 'skills' %}active{% endif %}" href="{{ url_for('skills_page') }}">Skills</a>
      <a class="nav-link {% if active_page == 'memory' %}active{% endif %}" href="{{ url_for('memory_page') }}">Memory</a>
      <a class="nav-link {% if active_page == 'settings' %}active{% endif %}" href="{{ url_for('settings_page') }}">Settings</a>
    </div>
    <div class="nav-right">
      <span class="nav-pill">
        <span class="status-dot"></span>{% if active_model %}{{ active_model }} · ready{% else %}No provider{% endif %}
      </span>
    </div>
  </nav>

  <div class="app-body">
    {% block content %}{% endblock %}
  </div>

  <!-- Tweaks panel temporarily disabled.
  <div id="tweaks-root"></div>
  <script type="text/babel" src="{{ url_for('static', path='tweaks-panel.jsx') }}"></script>
  -->
  <script src="{{ url_for('static', path='marked.min.js') }}"></script>
  <script src="{{ url_for('static', path='dompurify.min.js') }}"></script>
  <script src="{{ url_for('static', path='markdown.js') }}"></script>
  {% block page_scripts %}{% endblock %}
</body>
</html>
